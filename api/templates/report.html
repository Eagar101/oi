{% extends "base.html" %}
{% block title %}报告 - 深度研究智能体{% endblock %}

{% block content %}
<div class="report-page">
  <div class="report-header">
    <a href="/dashboard" class="back-link">← 返回控制台</a>
    <div class="report-actions">
      <button class="btn-ghost" onclick="downloadReport()">下载Markdown</button>
      <button class="btn-danger" onclick="deleteCurrentReport()">删除报告</button>
    </div>
  </div>

  <div class="report-meta">
    <h1>研究报告</h1>
    <div class="meta-row">
      <span>任务ID: <code id="taskId"></code></span>
      <span>查询: <strong id="taskQuery"></strong></span>
      <span>创建时间: <span id="taskCreated"></span></span>
    </div>
  </div>

  <!-- 知识图谱可视化 -->
  <div class="card graph-card">
    <h2>🌐 知识图谱</h2>
    <p class="card-desc">点击节点查看详情，节点间连线表示关键词关系</p>
    <svg id="graphSvg" width="100%" height="400" style="background:#fafbfc;border-radius:8px;"></svg>
    <div id="nodeDetail" class="node-detail"></div>
  </div>

  <!-- 任务关系树 -->
  <div class="card tree-card" id="treeCard" style="display:none;">
    <h2>🌳 任务关系树</h2>
    <p class="card-desc">本报告及其追问任务层级</p>
    <div id="treeContainer"></div>
  </div>

  <!-- 追问区域 -->
  <div class="card followup-card">
    <h2>💬 追问</h2>
    <p class="card-desc">基于本报告继续提问，将生成追加章节</p>
    <form id="followupForm">
      <div class="form-group">
        <textarea name="query" rows="2" required
          placeholder="如：第二章节的方案能否详细说明实施步骤？"></textarea>
      </div>
      <button type="submit" class="btn-primary">提交追问</button>
    </form>
  </div>

  <div class="report-content" id="reportContent">
    <div class="loading">报告加载中...</div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/report.js"></script>
{% endblock %}
