{% extends "base.html" %}
{% block title %}登录 - 深度研究智能体{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>登录</h1>
  <p class="subtitle">登录后开始你的深度研究</p>

  <form id="loginForm" class="auth-form">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" required autocomplete="username" placeholder="请输入用户名">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
    </div>
    <button type="submit" class="btn-primary">登录</button>
    <p class="form-footer">
      还没有账号？<a href="/register">立即注册</a>
    </p>
  </form>
</div>
{% endblock %}
