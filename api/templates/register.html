{% extends "base.html" %}
{% block title %}注册 - 深度研究智能体{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>注册</h1>
  <p class="subtitle">创建账号以使用深度研究</p>

  <form id="registerForm" class="auth-form">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" required autocomplete="username" placeholder="3-20个字符">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" required autocomplete="new-password" placeholder="至少6位">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" name="password2" required autocomplete="new-password" placeholder="再次输入密码">
    </div>
    <button type="submit" class="btn-primary">注册</button>
    <p class="form-footer">
      已有账号？<a href="/login">直接登录</a>
    </p>
  </form>
</div>
{% endblock %}
